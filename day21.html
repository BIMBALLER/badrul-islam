<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrasat Badrul Islam - Ramadan Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        .sheikh-gradient {
            background: linear-gradient(to top, rgba(6, 78, 59, 1) 0%, rgba(6, 78, 59, 0) 40%);
        }
    </style>
</head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center p-4 md:p-10">

    <div class="max-w-5xl w-full bg-white shadow-[0_35px_60px_-15px_rgba(0,0,0,0.3)] rounded-sm overflow-hidden flex flex-col md:flex-row border-[12px] border-white">
        
        <div class="md:w-1/2 bg-emerald-900 relative min-h-[400px] flex items-end justify-center overflow-hidden">
            <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/islamic-art.png')]"></div>
            
            <div class="absolute top-6 left-6 z-30 bg-yellow-500 text-emerald-900 font-black rounded-full w-20 h-20 flex flex-col items-center justify-center shadow-xl border-4 border-white">
                <span class="text-[10px] uppercase tracking-tighter">DAY</span>
                <span class="text-3xl leading-none">21</span>
            </div>

            <img src="IMG-20240320-WA0011.jpg" alt="Sheikh" class="relative z-10 max-h-[90%] object-contain drop-shadow-[0_20px_20px_rgba(0,0,0,0.5)]">
            
            <div class="absolute inset-0 z-20 sheikh-gradient"></div>

            <div class="absolute bottom-6 z-30 text-center w-full">
                <p class="text-yellow-400 font-bold text-xs tracking-[0.3em] uppercase">Madrasat Badrul Islam</p>
            </div>
        </div>

        <div class="md:w-1/2 bg-[#fdfcf7] p-8 md:p-16 flex flex-col justify-center relative">
            <div class="absolute top-8 right-8 w-16 h-16 opacity-80">
                <img src="image.jpg" alt="Logo" class="w-full h-full object-contain">
            </div>

            <div class="space-y-8">
                <div>
                    <h2 class="text-emerald-900 font-black text-sm tracking-[0.4em] uppercase mb-2">Ramadan 1447 AH</h2>
                    <h1 class="serif text-4xl md:text-5xl font-black text-gray-800 leading-tight">The Night of Majesty</h1>
                </div>

                <div class="w-20 h-1.5 bg-yellow-500"></div>

                <div class="relative">
                    <span class="text-7xl text-emerald-900/10 absolute -top-10 -left-6 serif italic">"</span>
                    <p class="serif text-xl md:text-2xl italic text-gray-700 leading-relaxed relative z-10">
                        Indeed, We sent the Qur'an down during the Night of Decree.
                    </p>
                </div>

                <div class="pt-4">
                    <p class="text-emerald-900 font-black text-sm uppercase tracking-widest italic">— Quran 97:1</p>
                </div>

                <div class="bg-emerald-900/5 p-6 border-l-4 border-emerald-900 rounded-r-lg">
                    <h4 class="text-emerald-900 font-bold text-xs uppercase mb-2">Prayer for the Night</h4>
                    <p class="text-gray-800 font-medium italic text-sm">
                        "O Allah, You are Forgiving and love forgiveness, so forgive me."
                    </p>
                </div>
            </div>

            <div class="mt-12 pt-8 border-t border-gray-200">
                <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em]">
                    Grant our plea O Lord today, tomorrow and always. Amin.
                </p>
            </div>
        </div>
    </div>

</body>
</html>
