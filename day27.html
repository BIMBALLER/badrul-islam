<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 27 - Madrasat Badrul Islam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        .glow { text-shadow: 0 0 15px rgba(234, 179, 8, 0.4); }
        .sheikh-gradient {
            background: linear-gradient(to top, #0f172a 0%, transparent 40%);
        }
        @media print {
            body { background-color: white !important; -webkit-print-color-adjust: exact; }
            .max-w-5xl { box-shadow: none !important; border: none !important; }

<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 md:p-10">

    <div class="max-w-5xl w-full bg-white shadow-[0_35px_60px_-15px_rgba(0,0,0,0.3)] rounded-sm overflow-hidden flex flex-col md:flex-row border-[12px] border-white">
        
        <div class="md:w-1/2 bg-slate-900 relative min-h-[500px] flex items-end justify-center overflow-hidden flex-shrink-0">
            <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/islamic-art.png')]"></div>
            
            <div class="absolute top-6 left-6 z-30 bg-yellow-500 text-slate-900 font-black rounded-full w-20 h-20 flex flex-col items-center justify-center shadow-xl border-4 border-white">
                <span class="text-[10px] uppercase tracking-tighter">DAY</span>
                <span class="text-3xl leading-none">27</span>
            </div>

            <img src="Snapchat-403989511.jpg" alt="Sheikh" class="relative z-10 max-h-[90%] object-contain drop-shadow-[0_0_30px_rgba(234,179,8,0.3)]">
            
            <div class="absolute inset-0 z-20 sheikh-gradient"></div>

            <div class="absolute bottom-6 z-30 text-center w-full px-4">
                <p class="text-yellow-500 font-bold text-xs tracking-[0.3em] uppercase">Madrasat Badrul Islam</p>
            </div>
        </div>

        <div class="md:w-1/2 bg-[#fdfcf7] p-8 md:p-12 lg:p-16 flex flex-col justify-between relative">
            
            <div class="flex justify-end mb-4">
                <div class="w-16 h-16 flex-shrink-0">
                    <img src="image.jpg" alt="Logo" class="w-full h-full object-contain opacity-90">
                </div>
            </div>

            <div class="space-y-6">
                <div>
                    <h2 class="text-slate-900 font-black text-sm tracking-[0.4em] uppercase mb-2">Ramadan 1447 AH</h2>
                    <h1 class="serif text-4xl md:text-5xl font-black text-gray-800 leading-tight glow">Lailatul Qadr</h1>
                </div>

                <div class="w-20 h-1.5 bg-yellow-500"></div>

                <div class="relative">
                    <span class="text-6xl text-slate-900/10 absolute -top-8 -left-4 serif italic select-none">"</span>
                    <p class="serif text-xl md:text-2xl italic text-gray-700 leading-relaxed relative z-10">

                    </p>
                </div>

                <div class="pt-2">
                    <p class="text-emerald-900 font-black text-sm uppercase tracking-widest italic">— Quran 97:1</p>
                </div>

                <div class="bg-slate-900 text-white p-6 border-l-4 border-yellow-500 rounded-r-lg">
                    <h4 class="text-yellow-500 font-bold text-xs uppercase mb-2 tracking-wider">The Ultimate Prayer</h4>
                    <p class="italic text-sm">
                        "Allahumma innaka 'afuwwun tuhibbul 'afwa fa'fu 'anni."
                    </p>
                </div>
            </div>

            <div class="mt-12 pt-6 border-t border-gray-200">
                <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em] leading-relaxed">
                    Grant our plea O Lord today, tomorrow and always. Amin.
                </p>
            </div>
        </div>
